{% extends "layout.html" %}

{% block nav %}{% endblock %}

{% block main %}
    <h4>New Room</h4>
    <form action="/create" method="post">
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control w-50 mx-auto" name="displayname" placeholder="My display name" type="text">
        </div>
        <div class="mb-3">
            <button class="btn btn-primary w-50 mx-auto" type="submit">Create room</button>
        </div>
    </form>
{% endblock %}
